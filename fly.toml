# fly.toml — Fly.io configuration for FIIS-bot
# See https://fly.io/docs/reference/configuration/

app = "fiis-bot"
primary_region = "gru"  # São Paulo, Brazil (closest to Brazilian markets)

[build]
  dockerfile = "Dockerfile"

# No HTTP service needed — this is a long-polling Telegram bot
# We use a "machine" process instead of an HTTP service

[processes]
  bot = "java -jar app.jar"

# Keep the bot running with minimal resources
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["bot"]
  auto_stop_machines = false

[env]
  # Set these via `fly secrets set` — NEVER put real values here
  # TELEGRAM_BOT_TOKEN = ""
  # TELEGRAM_BOT_USERNAME = ""
